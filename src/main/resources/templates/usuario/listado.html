<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head('Usuarios')}"></head>
    <body>
        <div th:replace="~{general/fragmentos :: sidebar}"></div>
        <div class="page">
            <div th:replace="~{general/fragmentos :: topbar}"></div>
            <main class="content">
                <div class="head">
                    <h1>Usuarios y roles</h1>
                    <a class="btn btn-primary" th:href="@{/usuarios/nuevo}">Registrar usuario</a>
                </div>
                <div class="panel">
                    <table class="table">
                        <tr>
                            <th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Acciones</th>
                        </tr>
                        <tr th:each="u:${usuarios}">
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.correo}"></td>
                            <td th:text="${u.rol.nombre}"></td>
                            <td th:text="${u.estado ? 'Activo' : 'Inactivo'}"></td>
                            <td>
                                <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}">Editar</a> |
                                <a class="text-danger" th:href="@{/usuarios/desactivar/{id}(id=${u.idUsuario})}" onclick="return confirm('¿Seguro que desea desactivar este usuario?');">Desactivar</a>
                            </td>
                        </tr>
                    </table>
                </div>
            </main>
            <div th:replace="~{general/fragmentos :: footer}"></div>
        </div>
        <div th:replace="~{general/fragmentos :: scripts}"></div>
    </body>
</html>
