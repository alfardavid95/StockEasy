<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{general/fragmentos :: head('Usuario')}"></head><body><div th:replace="~{general/fragmentos :: sidebar}"></div><div class="page"><div th:replace="~{general/fragmentos :: topbar}"></div><main class="content"><h1>Usuario</h1><form class="panel formgrid" th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post"><input type="hidden" th:field="*{idUsuario}"><input class="form-control" th:field="*{nombre}" placeholder="Nombre"><input class="form-control" th:field="*{correo}" placeholder="Correo"><input class="form-control" th:field="*{contrasena}" placeholder="Contraseña"><select class="form-select" th:field="*{rol.idRol}"><option value="">Rol</option><option th:each="r:${roles}" th:value="${r.idRol}" th:text="${r.nombre}"></option></select><select class="form-select" th:field="*{estado}"><option th:value="true">Activo</option><option th:value="false">Inactivo</option></select><div class="full right"><button class="btn btn-primary">Guardar</button></div></form></main><div th:replace="~{general/fragmentos :: footer}"></div></div><div th:replace="~{general/fragmentos :: scripts}"></div></body></html>
