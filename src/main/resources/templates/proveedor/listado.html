<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{general/fragmentos :: head('Proveedores')}"></head><body><div th:replace="~{general/fragmentos :: sidebar}"></div><div class="page"><div th:replace="~{general/fragmentos :: topbar}"></div><main class="content"><div class="head"><h1>Proveedores</h1><a class="btn btn-primary" th:href="@{/proveedores/nuevo}">Registrar</a></div><div class="panel"><table class="table"><tr><th>Nombre</th><th>Teléfono</th><th>Correo</th><th>Dirección</th><th>Estado</th><th>Acciones</th></tr><tr th:each="e:${proveedores}"><td th:text="${e.nombre}"></td><td th:text="${e.telefono}"></td><td th:text="${e.correo}"></td><td th:text="${e.direccion}"></td><td th:text="${e.estado ? 'Activo' : 'Inactivo'}"></td><td><a th:href="@{/proveedores/editar/{id}(id=${e.idProveedor})}">Editar</a> | <a class="text-danger" th:href="@{/proveedores/desactivar/{id}(id=${e.idProveedor})}">Desactivar</a></td></tr></table></div></main><div th:replace="~{general/fragmentos :: footer}"></div></div><div th:replace="~{general/fragmentos :: scripts}"></div></body></html>
