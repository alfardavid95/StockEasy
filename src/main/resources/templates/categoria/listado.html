<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head('Categorias')}"></head>
    <body>
        <div th:replace="~{general/fragmentos :: sidebar}"></div>
        <div class="page">
            <div th:replace="~{general/fragmentos :: topbar}"></div>
            <main class="content">
                <div class="head">
                    <h1>Categorias</h1>
                    <a class="btn btn-primary" th:href="@{/categorias/nuevo}">Registrar</a>
                </div>
                <div class="panel">
                    <table class="table">
                        <tr>
                            <th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th>
                        </tr>
                        <tr th:each="e:${categorias}">
                            <td th:text="${e.nombre}"></td>
                            <td th:text="${e.descripcion}"></td>
                            <td th:text="${e.estado ? 'Activo' : 'Inactivo'}"></td>
                            <td>
                                <a th:href="@{/categorias/editar/{id}(id=${e.idCategoria})}">Editar</a> |
                                <a class="text-danger" th:href="@{/categorias/desactivar/{id}(id=${e.idCategoria})}" onclick="return confirm('¿Seguro que desea desactivar esta categoría?');">Desactivar</a>
                            </td>
                        </tr>
                    </table>
                </div>
            </main>
            <div th:replace="~{general/fragmentos :: footer}"></div>
        </div>
        <div th:replace="~{general/fragmentos :: scripts}"></div>
    </body>
</html>
