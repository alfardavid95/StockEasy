<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{general/fragmentos :: head('Salida')}"></head><body><div th:replace="~{general/fragmentos :: sidebar}"></div><div class="page"><div th:replace="~{general/fragmentos :: topbar}"></div><main class="content"><h1>Registrar salida de inventario</h1><div th:if="${error}" class="alert alert-danger" th:text="${error}"></div><form class="panel formgrid" th:action="@{/movimientos/salida/guardar}" method="post"><select class="form-select" name="idProducto" required><option value="">Producto</option><option th:each="p:${productos}" th:value="${p.idProducto}" th:text="${p.codigo+' - '+p.nombre+' / Stock: '+p.stockActual}"></option></select><input class="form-control" type="number" min="1" name="cantidad" placeholder="Cantidad" required><textarea class="form-control full" name="observacion" placeholder="Observación"></textarea><div class="full alert alert-info">Validación: la cantidad a retirar no puede ser mayor al stock disponible.</div><div class="full right"><button class="btn btn-primary">Guardar salida</button></div></form></main><div th:replace="~{general/fragmentos :: footer}"></div></div><div th:replace="~{general/fragmentos :: scripts}"></div></body></html>
