<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head('Movimientos')}"></head>
    <body>
        <div th:replace="~{general/fragmentos :: sidebar}"></div>
        <div class="page">
            <div th:replace="~{general/fragmentos :: topbar}"></div>
            <main class="content">
                <h1>Historial de movimientos</h1>
                <form class="filters" method="get">
                    <input class="form-control" name="texto" placeholder="Buscar producto" th:value="${texto}">
                    <select class="form-select" name="tipo">
                        <option value="">Todos</option>
                        <option th:selected="${tipo == 'Entrada'}">Entrada</option>
                        <option th:selected="${tipo == 'Salida'}">Salida</option>
                    </select>
                    <input class="form-control" type="date" name="fechaInicio" th:value="${fechaInicio}">
                    <input class="form-control" type="date" name="fechaFin" th:value="${fechaFin}">
                    <button class="btn btn-outline-primary">Buscar</button>
                </form>
                <div class="panel">
                    <table class="table">
                        <tr>
                            <th>Fecha</th><th>Código</th><th>Producto</th><th>Tipo</th><th>Cantidad</th>
                            <th>Stock anterior</th><th>Stock nuevo</th><th>Usuario</th><th>Observación</th>
                        </tr>
                        <tr th:each="m:${movimientos}">
                            <td th:text="${#temporals.format(m.fecha,'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${m.producto.codigo}"></td>
                            <td th:text="${m.producto.nombre}"></td>
                            <td th:text="${m.tipoMovimiento.nombre}"></td>
                            <td th:text="${m.cantidad}"></td>
                            <td th:text="${m.stockAnterior}"></td>
                            <td th:text="${m.stockNuevo}"></td>
                            <td th:text="${m.usuario.nombre}"></td>
                            <td th:text="${m.observacion}"></td>
                        </tr>
                    </table>
                </div>
            </main>
            <div th:replace="~{general/fragmentos :: footer}"></div>
        </div>
        <div th:replace="~{general/fragmentos :: scripts}"></div>
    </body>
</html>
