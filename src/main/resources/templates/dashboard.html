<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{general/fragmentos :: head('Dashboard')}"></head><body><div th:replace="~{general/fragmentos :: sidebar}"></div><div class="page"><div th:replace="~{general/fragmentos :: topbar}"></div><main class="content"><h1>Dashboard principal</h1><p>Vista general del inventario de StockEasy</p><section class="cards"><div class="cardx"><span>Total de productos</span><b th:text="${totalProductos}">0</b></div><div class="cardx warn"><span>Productos con bajo stock</span><b th:text="${totalBajoStock}">0</b></div><div class="cardx"><span>Entradas del mes</span><b th:text="${entradasMes}">0</b></div><div class="cardx"><span>Salidas del mes</span><b th:text="${salidasMes}">0</b></div></section><section class="grid"><div class="panel"><h2>Últimos movimientos</h2><table class="table"><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th></tr><tr th:each="m:${ultimos}"><td th:text="${#temporals.format(m.fecha,'dd/MM/yyyy HH:mm')}"></td><td th:text="${m.producto.nombre}"></td><td th:text="${m.tipoMovimiento.nombre}"></td><td th:text="${m.cantidad}"></td></tr></table></div><div class="panel"><h2>Alertas de bajo stock</h2><div th:each="p:${bajoStock}" class="alert alert-warning"><b th:text="${p.nombre}"></b><br><span th:text="'Stock: '+${p.stockActual}+' / Mínimo: '+${p.stockMinimo}"></span></div></div></section></main><div th:replace="~{general/fragmentos :: footer}"></div></div><div th:replace="~{general/fragmentos :: scripts}"></div></body></html>
