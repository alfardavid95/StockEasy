<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title th:text="${titulo} + ' - StockEasy'">StockEasy</title><link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"><link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}"><link rel="stylesheet" th:href="@{/css/stockeasy.css}"></head>
<body>
<aside class="sidebar" th:fragment="sidebar"><div class="brand"><i class="fa-solid fa-cube"></i><div><b>Stock<span>Easy</span></b><small>Control de Inventario</small></div></div><nav><a th:href="@{/dashboard}"><i class="fa-solid fa-house"></i>Dashboard</a><a th:href="@{/productos/listado}"><i class="fa-solid fa-box"></i>Productos</a><a th:href="@{/categorias/listado}"><i class="fa-solid fa-tags"></i>Categorías</a><a th:href="@{/proveedores/listado}"><i class="fa-solid fa-truck"></i>Proveedores</a><a th:href="@{/movimientos/entrada}"><i class="fa-solid fa-download"></i>Entradas</a><a th:href="@{/movimientos/salida}"><i class="fa-solid fa-upload"></i>Salidas</a><a th:href="@{/movimientos/listado}"><i class="fa-solid fa-right-left"></i>Movimientos</a><a th:href="@{/reportes/bajo-stock}"><i class="fa-solid fa-chart-column"></i>Reportes</a><a th:href="@{/usuarios/listado}"><i class="fa-solid fa-users"></i>Usuarios</a></nav></aside>
<header class="topbar" th:fragment="topbar"><span></span><div>Usuario: <b th:text="${session.usuarioSesion != null ? session.usuarioSesion.nombre : 'Administrador'}">Administrador</b> | <a th:href="@{/logout}">Cerrar sesión</a></div></header>
<footer class="footer" th:fragment="footer">© 2026 StockEasy. Todos los derechos reservados.</footer>
<div th:fragment="scripts"><script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script></div>
</body></html>
