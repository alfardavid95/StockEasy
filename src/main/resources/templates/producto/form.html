<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head('Producto')}"></head>
    <body>
        <div th:replace="~{general/fragmentos :: sidebar}"></div>
        <div class="page">
            <div th:replace="~{general/fragmentos :: topbar}"></div>
            <main class="content">
                <h1>Producto</h1>
                <form class="panel formgrid" th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{idProducto}">
                    <div>
                        <input class="form-control" th:field="*{codigo}" placeholder="Código" required>
                        <span class="text-danger" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></span>
                    </div>
                    <input class="form-control" th:field="*{nombre}" placeholder="Nombre" required>

                    <select class="form-select" th:field="*{categoria.idCategoria}" required>
                        <option value="">Categoría</option>
                        <option th:each="c:${categorias}" th:value="${c.idCategoria}" th:text="${c.nombre}"></option>
                    </select>

                    <select class="form-select" th:field="*{proveedor.idProveedor}" required>
                        <option value="">Proveedor</option>
                        <option th:each="p:${proveedores}" th:value="${p.idProveedor}" th:text="${p.nombre}"></option>
                    </select>

                    <div>
                        <input class="form-control" type="number" step="0.01" min="0" th:field="*{precio}" placeholder="Precio">
                        <span class="text-danger" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
                    </div>

                    <div>
                        <input class="form-control" type="number" min="0" th:field="*{stockActual}" placeholder="Stock actual">
                        <span class="text-danger" th:if="${#fields.hasErrors('stockActual')}" th:errors="*{stockActual}"></span>
                    </div>

                    <div>
                        <input class="form-control" type="number" min="0" th:field="*{stockMinimo}" placeholder="Stock mínimo">
                        <span class="text-danger" th:if="${#fields.hasErrors('stockMinimo')}" th:errors="*{stockMinimo}"></span>
                    </div>

                    <select class="form-select" th:field="*{estado}">
                        <option th:value="true">Activo</option>
                        <option th:value="false">Inactivo</option>
                    </select>

                    <textarea class="form-control full" th:field="*{descripcion}" placeholder="Descripción"></textarea>

                    <div class="full right">
                        <a class="btn btn-secondary" th:href="@{/productos/listado}">Cancelar</a>
                        <button class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </main>
            <div th:replace="~{general/fragmentos :: footer}"></div>
        </div>
        <div th:replace="~{general/fragmentos :: scripts}"></div>
    </body>
</html>
