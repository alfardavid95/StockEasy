<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{general/fragmentos :: head('Detalle producto')}"></head><body><div th:replace="~{general/fragmentos :: sidebar}"></div><div class="page"><div th:replace="~{general/fragmentos :: topbar}"></div><main class="content"><h1>Detalle del producto</h1><div class="panel"><h2 th:text="${producto.nombre}"></h2><p><b>Código:</b> <span th:text="${producto.codigo}"></span></p><p><b>Categoría:</b> <span th:text="${producto.categoria.nombre}"></span> | <b>Proveedor:</b> <span th:text="${producto.proveedor.nombre}"></span></p><p><b>Stock:</b> <span th:text="${producto.stockActual}"></span> / <span th:text="${producto.stockMinimo}"></span></p><p th:text="${producto.descripcion}"></p><a class="btn btn-primary" th:href="@{/productos/editar/{id}(id=${producto.idProducto})}">Editar</a></div><div class="panel mt-3"><h2>Últimos movimientos</h2><table class="table"><tr><th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Stock nuevo</th><th>Observación</th></tr><tr th:each="m:${movimientos}"><td th:text="${#temporals.format(m.fecha,'dd/MM/yyyy HH:mm')}"></td><td th:text="${m.tipoMovimiento.nombre}"></td><td th:text="${m.cantidad}"></td><td th:text="${m.stockNuevo}"></td><td th:text="${m.observacion}"></td></tr></table></div></main><div th:replace="~{general/fragmentos :: footer}"></div></div><div th:replace="~{general/fragmentos :: scripts}"></div></body></html>
